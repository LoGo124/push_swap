": [5536.0, 5800.0, 6052.0, 6304.0, 6544.0, 6784.0], "borderWidth": 2, "tension": 0.2, "pointRadius": 3}, {"label": "adaptive", "data": [5327.44, 5659.8, 5988.56, 6290.2, 6541.0, 6911.1], "borderWidth": 2, "tension": 0.2, "pointRadius": 3}]}, {"title": "bench summary 02(8 25)", "size": [8.0, 10.0, 12.0, 15.0, 25.0], "datasets": [{"label": "simple", "data": [24.1, 33.62, 43.3, 58.94, 129.84], "borderWidth": 2, "tension": 0.2, "pointRadius": 3}, {"label": "medium", "data": [23.88, 34.2, 42.78, 55.46, 101.74], "borderWidth": 2, "tension": 0.2, "pointRadius": 3}, {"label": "complex", "data": [23.86, 65.0, 76.0, 92.0, 196.0], "borderWidth": 2, "tension": 0.2, "pointRadius": 3}, {"label": "adaptive", "data": [24.12, 33.26, 62.06, 74.32, 140.68], "borderWidth": 2, "tension": 0.2, "pointRadius": 3}]}, {"title": "bench summary 02", "size": [8.0, 10.0, 12.0, 15.0, 25.0, 50.0, 100.0, 250.0, 500.0, 1000.0], "datasets": [{"label": "simple", "data": [24.1, 33.62, 43.3, 58.94, 129.84, 414.08, 1455.22, 8306.7, 32226.42, 127284.86], "borderWidth": 2, "tension": 0.2, "pointRadius": 3}, {"label": "medium", "data": [23.88, 34.2, 42.78, 55.46, 101.74, 258.7, 690.88, 2787.84, 7086.84, 19332.1], "borderWidth": 2, "tension": 0.2, "pointRadius": 3}, {"label": "complex", "data": [23.86, 65.0, 76.0, 92.0, 196.0, 467.0, 1084.0, 3017.0, 6784.0, 15068.0], "borderWidth": 2, "tension": 0.2, "pointRadius": 3}, {"label": "adaptive", "data": [24.12, 33.26, 62.06, 74.32, 140.68, 352.82, 903.98, 2899.72, 6915.28, 17068.12], "borderWidth": 2, "tension": 0.2, "pointRadius": 3}]}];

    const palette = ['#4e79a7', '#f28e2b', '#e15759', '#76b7b2', '#59a14f', '#edc949', '#af7aa1', '#ff9da7', '#9c755f', '#bab0ab'];

    function getColor(label, alpha = 1) {
      const index = Math.abs(label.split('').reduce((acc, ch) => acc + ch.charCodeAt(0), 0)) % palette.length;
      const base = palette[index];
      if (alpha === 1) return base;
      const hex = base.replace('#', '');
      const r = parseInt(hex.slice(0, 2), 16);
      const g = parseInt(hex.slice(2, 4), 16);
      const b = parseInt(hex.slice(4, 6), 16);
      return 'rgba(' + r + ', ' + g + ', ' + b + ', ' + alpha + ')';
    }

    function createChart(container, config) {
      const canvas = document.createElement('canvas');
      container.appendChild(canvas);
      new Chart(canvas, {
        type: 'line',
        data: {
          labels: config.size,
          datasets: config.datasets.map((dataset) => ({
            ...dataset,
            borderColor: getColor(dataset.label),
            backgroundColor: getColor(dataset.label, 0.2),
            fill: false,
          }))
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            title: { display: true, text: config.title },
            legend: { position: 'top' }
          },
          scales: {
            x: { title: { display: true, text: 'Size' } },
            y: { title: { display: true, text: 'Value' } }
          }
        }
      });
    }

    const chartsContainer = document.getElementById('charts');
    chartConfigs.forEach((config, index) => {
      const card = document.createElement('section');
      card.className = 'chart-card';
      card.innerHTML = '<h2>' + config.title + '</h2>' +
        '<div class="description-box"><label for="desc-' + index + '">Descripción</label><textarea id="desc-' + index + '" placeholder="Añade una descripción aquí..."></textarea></div>' +
        '<div class="chart-container"></div>';
      chartsContainer.appendChild(card);
      createChart(card.querySelector('.chart-container'), config);
      if (index < chartConfigs.length - 1) {
        const separator = document.createElement('hr');
        chartsContainer.appendChild(separator);
      }
    });
  </script>
</body>
</html>
